name: Release

# Publishes the packages to NuGet when a version tag is pushed:
#   git tag v0.1.0-alpha.1 && git push origin v0.1.0-alpha.1
# Requires the NUGET_API_KEY repository secret (nuget.org API key scoped to push).

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Derive version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release /p:Version=$VERSION /p:ContinuousIntegrationBuild=true

      # LLM-backed tests auto-skip here because ANTHROPIC_API_KEY is not set.
      - name: Test
        run: dotnet test --no-build --configuration Release

      - name: Pack
        run: dotnet pack --no-build --configuration Release /p:Version=$VERSION --output packages

      - name: Push to NuGet
        run: >
          dotnet nuget push "packages/*.nupkg"
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicates
